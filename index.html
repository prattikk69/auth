<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireBase Auth</title>
    <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
        --bg: #080c0a;
        --green: #00ff88;
        --green-dim: #00ff8840;
        --green-muted: #00ff8890;
        --red: #ff2d55;
        --white: #e8f5ef;
        --scanline: rgba(0,255,136,0.03);
    }

    body {
        background: var(--bg);
        color: var(--green);
        font-family: 'Share Tech Mono', monospace;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }
    .container{
        border: solid var(--green-muted);
        padding: 20px;
        max-width: 60vw;
        border-radius: 2px;
        animation-delay: 0;
    }
    h1{
        border-bottom: solid .5px var(--green-muted);
        margin-bottom: 10px;
    }
    button{
        font-family: 'Share Tech Mono', monospace;
        margin: 5px;
        cursor: pointer;
    }
    #loginBtn{
        background-color: var(--bg);
        color: var(--green);
        border: solid .5px;
        padding: 10px;
        border-radius: 2px;
        transition: .2s;
        opacity: 0;
        animation-delay: 1s;
    }
    #loginBtn:hover{
        transform: translateY(-2px);
        box-shadow: 0 5px 5px var(--green-dim);
        background-color: var(--green-muted);
        color: var(--white);
    }
    #signupBtn{
        background-color: var(--green);
        color: var(--bg);
        border: solid .5px;
        padding: 10px;
        border-radius: 2px;
        transition: .2s;
        animation-delay: 1.5s;
        opacity: 0;
    }
    #signupBtn:hover{
        transform: translateY(-2px);
        background-color: var(--white);
        box-shadow: 0 5px 5px var(--green-dim);
    }
    .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        color: var(--green-muted);
        letter-spacing: 0.1em;
        animation: lineAppear 0.4s 3.8s forwards;
    }
    .status-dot{
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--red);
        display: inline-block;
        margin-right: 6px;
        animation: statusBlink 2s ease-in-out infinite;
    }
    @keyframes statusBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
    }
    .display{
        animation: popUp 1s forwards;
        opacity: 1;
    }
    @keyframes popUp{
        0%{
            transform: translateY(10px);
            opacity: .5;
        }
        100%{
            transform: translateY(0);
            opacity: 1;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Firebase authentication</h1>
        <p>This page was made for firebase auth practicing.</p>
        <p>The login and signup are end-to-end encrypted.</p>
        <p>This page is secured.</p>
        <br>
        <div class="status-bar">
            <span><span class="status-dot"></span>Z-Axis</span>
        </div>
        <button onclick="login()" id="loginBtn">Sign in to your account</button>
        <button onclick="signup()" id="signupBtn">Sign up to your account</button>
    </div>

    <script>
        function appear(){
            const btns = document.querySelectorAll('button');
            btns.forEach( btn =>{
                btn.classList.add("display");
            })
            const container = document.querySelector(".container");
            container.classList.add("display");
        }
        appear();
        function login(){
            window.location.href = "login.html";
        }
        function signup(){
            window.location.href = "signup.html";
        }

    </script>
</body>
</html>
